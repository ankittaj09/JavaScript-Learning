<!DOCTYPE html>
<html>
    <head>
    
        <title>Rock Paper Scissors</title>
    </head>
 
  
    <body>

        <p>Rock Paper Scissors</p>

        <button onclick = 'playGame("rock")
        '>Rock</button>  
         
         
        <button onclick = 'playGame("paper")
         '>Paper</button>

        <button onclick = 'playGame("scissors")'>Scissors</button>

        <p class = 'js-result'></p>

        <p class = 'js-moves'></p>

        <p class='js-score' ></p>

        <button onclick = '
        resetScore()'>Reset Score</button>

        
    
        <script>
            //localStorage.removeItem('score');

            //const score = JSON.parse(localStorage.getItem('score'));

            //localStorage.getItem("key")
            //console.log(localStorage.getItem('message'));

            
            let score = JSON.parse(localStorage.getItem('score')) || {
                    wins:0,
                    losses:0,
                    ties:0
                }; 
            console.log(JSON.parse(localStorage.getItem('score')));

            updateScoreElement();

            

            

            /*if(score === null){
                score = {
                    wins:0,
                    losses:0,
                    ties:0
                };
            }*/

            function playGame(playerMove){
                const computerMove = pickComputerMove();
         
                let result = "";

                if(playerMove==="scissors"){
                    if(computerMove === "rock"){
                        result = "You Lose";
                    }else if(computerMove === "paper"){
                        result = "You Win!";
                    }else if (computerMove === "scissors"){
                        result = "Tie";
                    }

                }else if(playerMove === "paper"){
                
                    if(computerMove === "rock"){
                        result = "You Win!";
                    }else if(computerMove === "paper"){
                        result = "Tie";
                    }else if (computerMove === "scissors"){
                        result = "You Lose";
                    }
                }else if(playerMove === "rock"){
                    if(computerMove === "rock"){
                        result = "Tie";
                    }else if(computerMove === "paper"){
                        result = "You Lose";
                    }else if (computerMove === "scissors"){
                        result = "You Win!";
                    }


                }

                if(result === "You Win!"){
                    score.wins += 1;

                }else if(result === "You Lose"){
                    score.losses += 1;

                }else if (result === "Tie"){
                    score.ties += 1;
                }
            
                console.log(score);
                //localStorage.setItem("key", "value")
                //localStorage.setItem('message','hello');localstorage only supports strings
                localStorage.setItem('score',JSON.stringify(score));

                document.querySelector('.js-result').innerHTML = result;

                document.querySelector('.js-moves').innerHTML = `You ${playerMove} - ${computerMove} Computer Move`;

                updateScoreElement();
            
                /*alert(`You Picked ${playerMove}. computer picked ${computerMove}, ${result}
Wins: ${score.wins}, Losses: ${score.losses},Ties: ${score.ties}`);*/

            }

            function updateScoreElement(){

            document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.losses},Ties: ${score.ties}`;
            }
      
            //let computerMove = ""; 
            function pickComputerMove(){
                const randomNumber = Math.random();
                let computerMove = ""; 
                

                if(randomNumber>= 0 && randomNumber< 1/3){
            
                    computerMove = "rock";
                }else if(randomNumber>= 1/3 && randomNumber< 2/3){
            
                    computerMove = "paper";
                }else if(randomNumber>= 2/3 && randomNumber< 1){
            
                    computerMove = "scissors";
              }
            

                

                return computerMove;
                //return; it will return undefined

                console.log('5');//so any thing after return statement function will not execute.


            }

            function resetScore() {
              score.wins = 0;
              score.losses = 0;
              score.ties = 0;

              localStorage.removeItem("score");

              updateScoreElement();

              document.querySelector('.js-result').innerHTML = '';

              document.querySelector('.js-moves').innerHTML = '';

            }

            
        </script>
 
    </body>
</html>
