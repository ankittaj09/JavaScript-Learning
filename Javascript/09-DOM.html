<!--
DOM-Document Object Model
DOM is a programming interface that allows JavaScript to access and modify HTML and CSS.

HTML
   ↓
Parser
   ↓
DOM Tree
   ↓
JavaScript modifies DOM
   ↓
Browser Repaint/Reflow
   ↓
Updated Screen

🌳 DOM is a Tree Structure

Top → document

Then → html

Then → body

Then → child elements

That’s why we call it Document Object Model

Document → whole page

Object → everything is object

Model → structured representation

The document object represents the DOM of a webpage and allows JavaScript to dynamically manipulate content, structure, style, and behavior.

-another built-in object called Document object which is linked to the webpage.

-when a HTML element is inside javascript,its just a javascript object.

-Every HTMl element has a property called (.innerHTML)


syntax rules for the DOM-

document.property.propety = value;

Properties and Methods-

Property:-
.title
.body(innerHTML)

Methods:-
document.querySelector()-lets us get any element from the page and put it inside Javascript.



-->
