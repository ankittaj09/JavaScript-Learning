<!-- 
HTML element for text box.
<input> also called void element 

whenever we get a value from the DOM,value will be a string

onkeydown="..." attribute executes when we press enter on our keyword

clicks,keydowns = events
onclick,onkeydown = event listeners

Event Listeners:-
onclick = click
onkeydown = key press
onscroll = scrolling
onmousenter = hovering over
onmouseleave = stophovering over

....and many more

Every event listener gets an event object.

steps:
when we press a key:
1.Check if the key is "Enter"
2.If it is,do the same thing as the calculate button

string() function convert number to string
Number() convert string to Number

WINDOW Object:-
document object represent the page
window object represent the browser
-->

<!DOCTYPE html>
<html>
    <head>
    
        <title>cart calculator</title>
    </head>
 
  
    <body>
      <p>Amazon Shipping Calculator</p>
      <p>Orders under $40 = +$10 shipping.</p>
      <p>Orders overs $40 = FREE shipping.</p>
      <input placeholder="Cost of Order" class = 'js-cost-input' onkeydown = "handleCostkeydown(event);">
      <button onclick="calculateTotal()">Calculate</button>
      <p class ='js-total-cost'></p>
         
        
    
      <script>
        window.document
        window.console.log('Ankit');
        window.alert();

        function handleCostkeydown(event){
          console.log(event.key);
          if(event.key==='Enter'){
          calculateTotal();
      }
          
        }
        function calculateTotal(){
          const inputElement = document.querySelector('.js-cost-input')

          let cost = Number(inputElement.value);

          if (cost<40){
            cost = cost +10;
          }

          document.querySelector('.js-total-cost').innerHTML = `$${cost}`;

        }
            
      </script>
 
    </body>
</html>
