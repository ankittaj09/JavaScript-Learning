<!DOCTYPE html>
<html>
  <head>
    
    <title>Cart Quantity</title>
    
  </head>
 
  
  <body>
    <p>
      Cart Quantity
    </p>

    
    <button onclick="console.log(`Cart Quantity: ${cartQuantity}`);">Show Quantity</button>  <!--here we can see variables also work with strings interpolation--> 
    

    <button onclick='cartQuantity !==10 && (cartQuantity+1)<=10 
      ? (cartQuantity += 1, console.log(`Cart Quantity: ${cartQuantity}`)):(cartQuantity === 10?alert("The Cart is full"):alert(`Now!You can only add  ${10-cartQuantity} items`)) '>Add to Cart</button>
           <!--cartQuantity +=  1--> 

    <button onclick = 'cartQuantity !==10 && (cartQuantity+2)<=10
      ? (cartQuantity += 2, console.log(`Cart Quantity: ${cartQuantity}`)):(cartQuantity === 10?alert("The Cart is full"):alert(`Now!You can only add  ${10-cartQuantity} items`))  '>+2</button>

    <button onclick = 'cartQuantity !==10 && (cartQuantity+3)<=10 
      ? (cartQuantity += 3, console.log(`Cart Quantity: ${cartQuantity}`)):(cartQuantity === 10?alert("The Cart is full"):alert(`Now!You can only add  ${10-cartQuantity} items`))  '>+3</button>

    <button onclick = 'cartQuantity !==10 && (cartQuantity+4)<=10
      ? (cartQuantity += 4, console.log(`Cart Quantity: ${cartQuantity}`)):(cartQuantity === 10?alert("The Cart is full"):alert(`Now!You can only add  ${10-cartQuantity} items`))  '>+4</button>

    <button onclick = 'cartQuantity !==10 && (cartQuantity+5)<=10
      ? (cartQuantity += 5, console.log(`Cart Quantity: ${cartQuantity}`)):(cartQuantity === 10?alert("The Cart is full"):alert(`Now!You can only add  ${10-cartQuantity} items`)) '>+5</button>

    <button onclick = 'cartQuantity == 0 || (cartQuantity -2)<0
      ? (cartQuantity == 0?alert("Not Enough items in the Cart"):alert(`only ${cartQuantity} can be removed`)) : (cartQuantity -= 2, console.log(`Cart Quantity: ${cartQuantity}`)) '>-2</button>

    <button onclick = 'cartQuantity == 0 || (cartQuantity -3)<0
      ? (cartQuantity == 0?alert("Not Enough items in the Cart"):alert(`only ${cartQuantity} can be removed`)) : (cartQuantity -= 3, console.log(`Cart Quantity: ${cartQuantity}`))'>-3</button>

    <button onclick = 'cartQuantity == 0 || (cartQuantity -1)<0
      ? (cartQuantity == 0?alert("Not Enough items in the Cart"):alert(`only ${cartQuantity} can be removed`)) : (cartQuantity --, console.log(`Cart Quantity: ${cartQuantity}`))'>Remove</button>
    
    <button onclick = 'cartQuantity = 0; console.log("Cart has reset."); console.log(`Cart Quantity: ${cartQuantity}`);'>Reset Cart</button>
    
    <script>
      //1.we need somewhere to save cart quantity & variables help us do that
      let cartQuantity = 0; //initially cart quantity is 0
      

      
    </script>
 
  </body>
</html>
