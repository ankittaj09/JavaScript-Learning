<!DOCTYPE html>
<html>
  <head>
    
    <title>Cart Quantity</title>
    
  </head>
 
  
  <body>
    <p>
      Cart Quantity
    </p>

    
    <button onclick="console.log(`Cart Quantity: ${cartQuantity}`);">Show Quantity</button>  <!--here we can see variables also work with strings interpolation--> 
    

    <button onclick='cartQuantity !== max_cartQuantity 
      ? (cartQuantity += 1, console.log(`Cart Quantity: ${cartQuantity}`)) : alert("The Cart is full")'>Add to Cart</button>
           <!--cartQuantity +=  1--> 

    <button onclick = 'cartQuantity !== max_cartQuantity 
      ? (cartQuantity += 2, console.log(`Cart Quantity: ${cartQuantity}`)) : alert("The Cart is full")'>+2</button>

    <button onclick = 'cartQuantity !== max_cartQuantity 
      ? (cartQuantity += 3, console.log(`Cart Quantity: ${cartQuantity}`)) : alert("The Cart is full")'>+3</button>

    <button onclick = 'cartQuantity !== max_cartQuantity 
      ? (cartQuantity += 4, console.log(`Cart Quantity: ${cartQuantity}`)) : alert("The Cart is full")'>+4</button>

    <button onclick = 'cartQuantity !== max_cartQuantity 
      ? (cartQuantity += 5, console.log(`Cart Quantity: ${cartQuantity}`)) : alert("The Cart is full")'>+5</button>

    <button onclick = 'cartQuantity<=0
      ? alert("Not Enough items in the Cart") : (cartQuantity -= 2, console.log(`Cart Quantity: ${cartQuantity}`)) '>-2</button>

    <button onclick = 'cartQuantity<=0
      ? alert("Not Enough items in the Cart") : (cartQuantity -= 3, console.log(`Cart Quantity: ${cartQuantity}`))'>-3</button>

    <button onclick = 'cartQuantity<=0
      ? alert("Not Enough items in the Cart") : (cartQuantity --, console.log(`Cart Quantity: ${cartQuantity}`))'>Remove</button>
    
    <button onclick = 'cartQuantity = 0; console.log("Cart has reset."); console.log(`Cart Quantity: ${cartQuantity}`);'>Reset Cart</button>
    
    <script>
      //1.we need somewhere to save cart quantity & variables help us do that
      let cartQuantity = 0; //initially cart quantity is 0
      let max_cartQuantity = 10;

      
    </script>
 
  </body>
</html>
